
buildscript {
    repositories {
        jcenter()
        maven {
            url 'https://maven.google.com/'
            name 'Google'
        }
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:3.5.2'
    }
}

apply plugin: 'com.android.library'

android {
    compileSdkVersion 30

    defaultConfig {
        minSdkVersion 16
        targetSdkVersion 30
        versionCode 1
        versionName "1.0"
    }
    lintOptions {
        abortOnError false
    }

    packagingOptions {
        pickFirst  '**/legacy-en-mnemonic-word-list.txt'
        pickFirst '**/legacy-logback.xml'
    }

}

repositories {
    mavenCentral()
    maven {
        url 'https://maven.google.com/'
        name 'Google'
    }
}

dependencies {
    implementation 'com.facebook.react:react-native:+'
    implementation 'io.neow3j:contract:3.19.3'
    implementation files('libs/neow3j-2.4.0.jar','libs/contract-2.4.0.jar', 'libs/core-2.4.0.jar', 'libs/crypto-2.4.0.jar', 'libs/model-2.4.0.jar', 'libs/utils-2.4.0.jar', 'libs/wallet-2.4.0.jar')
}