# .github/workflows/e2e-android.yml
name: Detox Test E2E Android
on:
  push:
    tags:
      - 'detox_e2e_android'
jobs:
  e2e-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16.19.1'

      - name: Install yarn
        run: npm install --global yarn    

      - name: Install Yarn dependencies
        run: yarn --force

      - name: Fix Android 31 links
        run: ln -s ${ANDROID_HOME}/build-tools/31.0.0/d8 ${ANDROID_HOME}/build-tools/31.0.0/dx && ln -s ${ANDROID_HOME}/build-tools/31.0.0/lib/d8.jar ${ANDROID_HOME}/build-tools/31.0.0/lib/dx.jar

      - name: Create keystore file
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/keystore.jks

      - name: Download Android Emulator Image
        run: |
          echo "y" | $ANDROID_HOME/tools/bin/sdkmanager --install "system-images;android-31;google_apis;x86_64"
          echo "no" | $ANDROID_HOME/tools/bin/avdmanager create avd --force --name emu --device "pixel" --abi "google_apis/x86_64" --package "system-images;android-31;google_apis;x86_64"
          $ANDROID_HOME/emulator/emulator -list-avds

      - name: Start Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          profile: Nexus 6P
          extra-opts: -no-window -no-audio
          exec: $ANDROID_HOME/emulator/emulator
        