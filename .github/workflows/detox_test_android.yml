# .github/workflows/e2e-android.yml
name: Detox Test E2E Android
on:
  push:
    tags:
      - 'detox_e2e_android'
jobs:
  e2e-android:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          cache: yarn
          node-version: '16.19.1'
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          cache: gradle
          distribution: temurin
          java-version: 13.0.14    

      - name: Install yarn
        run: npm install --global yarn    

      - name: Install Yarn dependencies
        run: yarn --force

      - name: Fix Android 31 links
        run: ln -s ${ANDROID_HOME}/build-tools/31.0.0/d8 ${ANDROID_HOME}/build-tools/31.0.0/dx && ln -s ${ANDROID_HOME}/build-tools/31.0.0/lib/d8.jar ${ANDROID_HOME}/build-tools/31.0.0/lib/dx.jar

      - name: Create keystore file
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/keystore.jks

      - name: Detox build
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: yarn detox build --configuration android.emu.release

      - name: Get device name
        id: device
        run: node -e "console.log('AVD_NAME=' + require('./.detoxrc').devices.emulator.device.avdName)" >> $GITHUB_OUTPUT  

      - name: Detox test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          avd-name: Pixel_6_API_31
          script: yarn detox test --configuration android.emu.release --headless --record-logs all
        